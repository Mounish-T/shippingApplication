<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart</title>

    <script src="https://kit.fontawesome.com/aa8d9a6dd9.js" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="../css/cart.css">
</head>

<body>

    <nav>

        <div class="nav-section">
            <a href="home.html" class="nav-btn">Home</a>
            <a href="cart.html" class="nav-btn isactive">My Cart</a>
            <a href="orders.html" class="nav-btn">My Orders</a>
        </div>

        <div class="profile-section">
            <div>
                <p>Welcome, <span>Mounish</span></p>
            </div>

            <div>
                <i class="fa-solid fa-circle-user"></i>
            </div>
        </div>

    </nav>

    <div class="cart-body" id="cart-body">
        <!-- JS script-->
    </div>

    <div class="payment-section" id="pay-section">
        <!-- JS script-->
    </div>

    <!-- Floating Address Button -->
    <div class="address-btn" id="address-btn">
        <i class="fa-solid fa-location-dot"></i>
        <span>Delivery Address</span>
    </div>

    <!-- Address Dialog -->
    <dialog id="address-dialog">

        <div class="dialog-header">

            <h2>
                <i class="fa-solid fa-location-dot"></i>
                Delivery Address
            </h2>

            <button id="close-btn">
                <i class="fa-solid fa-xmark"></i>
            </button>

        </div>

        <div class="dialog-body">

            <div id="address-view"></div>

            <div id="address-form" style="display:none;">

                <div>
                    <label for="name">Full Name</label>
                    <input type="text" id="name">
                </div>

                <div>
                    <label for="mobile">Mobile Number</label>
                    <input type="text" id="mobile">
                </div>

                <div>
                    <label for="house">House / Flat</label>
                    <input type="text" id="house">
                </div>

                <div>
                    <label for="city">City</label>
                    <input type="text" id="city">
                </div>

                <div>
                    <label for="state">State</label>
                    <input type="text" id="state">
                </div>

                <div>
                    <label for="pin">PIN Code</label>
                    <input type="text" id="pin">
                </div>
            </div>

        </div>

        <div class="dialog-footer">

            <button id="edit-btn">
                <i class="fa-solid fa-pen"></i>
                Edit
            </button>

            <button id="save-btn" style="display:none;">
                <i class="fa-solid fa-floppy-disk"></i>
                Save
            </button>

        </div>

    </dialog>

    <script type="module" src="../js/cart.js"></script>

</body>
</html>
